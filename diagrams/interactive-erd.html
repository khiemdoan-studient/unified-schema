<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studient Unified Schema — Interactive ERD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            overflow: hidden;
            height: 100vh;
        }
        /* Top toolbar */
        .toolbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: #161b22; border-bottom: 1px solid #30363d;
            padding: 8px 16px; display: flex; align-items: center; gap: 12px;
            height: 48px;
        }
        .toolbar h1 {
            font-size: 15px; font-weight: 600; color: #e6edf3;
            white-space: nowrap;
        }
        .toolbar .sep { width: 1px; height: 24px; background: #30363d; }
        .toolbar button {
            background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
            padding: 4px 12px; border-radius: 6px; cursor: pointer;
            font-size: 13px; transition: background 0.15s;
        }
        .toolbar button:hover { background: #30363d; }
        .toolbar button.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
        .toolbar .zoom-info {
            font-size: 12px; color: #8b949e; margin-left: auto;
            white-space: nowrap;
        }
        .toolbar .legend {
            display: flex; gap: 12px; margin-left: 12px;
        }
        .toolbar .legend-item {
            display: flex; align-items: center; gap: 4px; font-size: 12px;
        }
        .legend-dot {
            width: 10px; height: 10px; border-radius: 2px; display: inline-block;
        }
        /* Diagram container */
        #diagram-container {
            position: absolute; top: 48px; left: 0; right: 0; bottom: 0;
            overflow: hidden; cursor: grab;
        }
        #diagram-container:active { cursor: grabbing; }
        #diagram-container .mermaid {
            position: absolute;
            transform-origin: 0 0;
            transition: none;
        }
        /* Help overlay */
        .help-overlay {
            position: fixed; bottom: 16px; right: 16px; z-index: 100;
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            padding: 12px 16px; font-size: 12px; color: #8b949e;
            max-width: 260px; line-height: 1.6;
        }
        .help-overlay kbd {
            background: #21262d; border: 1px solid #30363d; border-radius: 3px;
            padding: 1px 5px; font-family: monospace; color: #c9d1d9; font-size: 11px;
        }
        /* Minimap */
        #minimap {
            position: fixed; bottom: 16px; left: 16px; z-index: 100;
            width: 200px; height: 140px;
            background: #161b22; border: 1px solid #30363d; border-radius: 8px;
            overflow: hidden;
        }
        #minimap svg { width: 100%; height: 100%; }
        #minimap .viewport-rect {
            fill: rgba(31, 111, 235, 0.15);
            stroke: #1f6feb; stroke-width: 2;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>Studient Unified Schema — ERD</h1>
        <div class="sep"></div>
        <button onclick="setView('full')" class="active" id="btn-full">Full Schema</button>
        <button onclick="setView('lesson-unified')" id="btn-lesson-unified">Lesson Unified</button>
        <button onclick="setView('weekly-dashboard')" id="btn-weekly-dashboard">Weekly Dashboard</button>
        <button onclick="setView('essential-skills')" id="btn-essential-skills">Essential Skills</button>
        <button onclick="setView('tests')" id="btn-tests">Tests &amp; Scores</button>
        <div class="legend">
            <span class="legend-item"><span class="legend-dot" style="background:#f0883e"></span> External Table</span>
            <span class="legend-item"><span class="legend-dot" style="background:#3fb950"></span> Intermediate View</span>
            <span class="legend-item"><span class="legend-dot" style="background:#1f6feb"></span> Primary Output</span>
        </div>
        <div class="zoom-info" id="zoom-info">100% · Scroll to zoom · Drag to pan</div>
        <button onclick="resetZoom()">Reset View</button>
        <button onclick="zoomIn()">+</button>
        <button onclick="zoomOut()">−</button>
    </div>

    <div id="diagram-container">
        <div class="mermaid" id="mermaid-target"></div>
    </div>

    <div class="help-overlay">
        <strong>Controls</strong><br>
        <kbd>Scroll</kbd> Zoom in/out<br>
        <kbd>Click + Drag</kbd> Pan around<br>
        <kbd>Double-click</kbd> Zoom to fit<br>
        <kbd>1-5</kbd> Switch views
    </div>

        };

        // ── Pan/Zoom state ──
        let scale = 1, panX = 0, panY = 0;
        let isDragging = false, startX, startY;
        const container = document.getElementById('diagram-container');
        const target = document.getElementById('mermaid-target');

        function updateTransform() {
            target.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            document.getElementById('zoom-info').textContent =
                `${Math.round(scale * 100)}% · Scroll to zoom · Drag to pan`;
        }

        // Mouse wheel zoom
        container.addEventListener('wheel', (e) => {
            e.preventDefault();
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(0.1, Math.min(5, scale * delta));
            // Zoom towards cursor
            panX = mouseX - (mouseX - panX) * (newScale / scale);
            panY = mouseY - (mouseY - panY) * (newScale / scale);
            scale = newScale;
            updateTransform();
        }, { passive: false });

        // Pan with mouse drag
        container.addEventListener('mousedown', (e) => {
            isDragging = true; startX = e.clientX - panX; startY = e.clientY - panY;
        });
        container.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            panX = e.clientX - startX; panY = e.clientY - startY;
            updateTransform();
        });
        container.addEventListener('mouseup', () => isDragging = false);
        container.addEventListener('mouseleave', () => isDragging = false);

        // Double-click to fit
        container.addEventListener('dblclick', () => resetZoom());

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') setView('full');
            else if (e.key === '2') setView('lesson-unified');
            else if (e.key === '3') setView('weekly-dashboard');
            else if (e.key === '4') setView('essential-skills');
            else if (e.key === '5') setView('tests');
            else if (e.key === '+' || e.key === '=') zoomIn();
            else if (e.key === '-') zoomOut();
            else if (e.key === '0') resetZoom();
        });

        function zoomIn() { scale = Math.min(5, scale * 1.25); updateTransform(); }
        function zoomOut() { scale = Math.max(0.1, scale * 0.8); updateTransform(); }

        function resetZoom() {
            const svg = target.querySelector('svg');
            if (!svg) return;
            const rect = container.getBoundingClientRect();
            const svgW = svg.viewBox.baseVal.width || svg.getBoundingClientRect().width;
            const svgH = svg.viewBox.baseVal.height || svg.getBoundingClientRect().height;
            scale = Math.min((rect.width - 40) / svgW, (rect.height - 40) / svgH, 1.5);
            panX = (rect.width - svgW * scale) / 2;
            panY = (rect.height - svgH * scale) / 2;
            updateTransform();
        }

        // ── View switching ──
        let currentView = 'full';

        async function setView(view) {
            currentView = view;
            // Update button states
            document.querySelectorAll('.toolbar button[id^="btn-"]').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + view);
            if (btn) btn.classList.add('active');

            // Render diagram
            target.innerHTML = '';
            const { svg } = await mermaid.render('erd-' + Date.now(), diagrams[view]);
            target.innerHTML = svg;

            // Fit to view after render
            setTimeout(resetZoom, 100);
        }

        // Initial render
        setView('full');
    </script>
